# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

locale                   : "en-US"
title                    : "Hungjui Yu"
title_separator          : "|"
email:
description              : "Hungjui Yu's personal academic website hosted on github."
repository               : "yuhungjui/yuhungjui.github.io"
twitter_username         : yuhungjui
github_username          : yuhungjui

minimal_mistakes_skin    : "mint"
# "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

search                   : true
logo                     : "/assets/images/YULOGO_1.png"
og_image                 : /assets/images/YULOGO_1.png

# Build settings
markdown                 : kramdown
remote_theme             : mmistakes/minimal-mistakes

# Outputting
# permalink                : /:categories/:title/
# paginate                 : 10 # amount of posts to show
# paginate_path            : /page:num/
# timezone:                # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

# Site Author
author:
  name             : "Hungjui Yu"
  avatar           : "/assets/images/bio-photo-2023-01.jpg"
  bio              : "Ph.D. in Atmospheric Sciences. Meteorologist/Scientist/Coder."
  orcid            : "https://orcid.org/0000-0002-3796-0967"
  googlescholar    : "https://scholar.google.com/citations?user=DHXgZyMAAAAJ"
  email            : " "
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/yuhungjui"
    - label: "Google Website (– 2022)"
      icon: "fas fa-fw fa-link"
      url: "https://sites.google.com/view/yuhungjui/home"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/Yuhungjui"
    # - label: "Instagram"
    #   icon: "fab fa-fw fa-instagram"
    #   url: "https://instagram.com/yuhungjui"

# Reading Files
include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/yuhungjui"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/Yuhungjui"
    # - label: "Instagram"
    #   icon: "fab fa-fw fa-instagram"
    #   url: "https://instagram.com/yuhungjui"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
